<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Afife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #CC1A1A;
    --red-dark: #A01515;
    --red-light: #F5E5E5;
    --yellow: #C8AA20;
    --yellow-bg: #FDF8E1;
    --white: #FFFFFF;
    --bg: #F7F7F7;
    --bg-card: #FFFFFF;
    --ink: #1A1A1A;
    --ink-soft: #444444;
    --gray: #888888;
    --gray-light: #CCCCCC;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Nunito Sans", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    padding: 1.25rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .header-logo img {
    height: 52px;
    width: auto;
    display: block;
  }

  .header-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 2rem;
  }

  .header-center p {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 0.02em;
  }

  .header-right { text-align: right; }

  .header-right .label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gray);
    font-weight: 400;
  }

  .header-right .value {
    font-family: "Nunito", sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--red);
    display: block;
    margin-top: 2px;
  }

  /* CONTROLES */
  .controls {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2.5rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray);
  }

  .search-wrap input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: "Nunito Sans", sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--gray-light); }

  /* FILTROS — desktop: pills, mobile: select */
  .filter-tabs {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tab {
    padding: 6px 14px;
    font-family: "Nunito Sans", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover { border-color: var(--red); color: var(--red); }
  .tab.ativo { background: var(--red); color: var(--white); border-color: var(--red); }
  .tab-novidades { border-color: var(--yellow); color: var(--yellow); }
  .tab-novidades:hover { background: var(--yellow-bg); }
  .tab-novidades.ativo { background: var(--yellow); color: var(--white); border-color: var(--yellow); }

  /* Select para mobile */
  .filter-select {
    display: none;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: "Nunito Sans", sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    min-width: 160px;
  }

  .filter-select:focus { border-color: var(--red); }

  @media (max-width: 640px) {
    .filter-tabs { display: none; }
    .filter-select { display: block; }
    header { padding: 1rem 1.25rem; }
    .header-center { display: none; }
    .controls { padding: 0.75rem 1.25rem; gap: 0.75rem; }
    main { padding: 1.25rem; }
  }

  /* MAIN */
  main { padding: 2.5rem; }

  /* BANNER NOVIDADES */
  .banner-novidades {
    background: var(--yellow-bg);
    border: 1px solid #e8d870;
    border-left: 3px solid var(--yellow);
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .banner-novidades p {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--yellow);
    font-weight: 700;
  }

  .banner-novidades p span {
    color: var(--ink-soft);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  /* SECAO */
  .secao-fornecedor { margin-bottom: 3.5rem; }

  .secao-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--red-light);
  }

  .secao-header h2 {
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--red-dark);
  }

  .secao-header .pill {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--red-light);
    border: 1px solid #e8c0c0;
    color: var(--red);
    padding: 2px 10px;
    border-radius: 20px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1.25rem;
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
  }

  /* CARD */
  .card {
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 20px rgba(204,26,26,0.15);
    border-color: var(--red);
  }

  .card-img-wrap {
    aspect-ratio: 3/4;
    overflow: hidden;
    background: #f0f0f0;
    position: relative;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }

  .card:hover .card-img-wrap img { transform: scale(1.05); }

  .card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-light);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .badge-novo {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--yellow);
    color: var(--white);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .card-info { padding: 10px 12px 12px; }

  .card-nome {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .card-fornecedor {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
    margin-top: 3px;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .lightbox.aberto { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .lightbox-img-wrap {
    flex: 1;
    min-width: 0;
    max-width: 65vw;
    max-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    overflow: hidden;
  }

  .lightbox-img-wrap img {
    max-width: 100%;
    max-height: 90vh;
    object-fit: contain;
    display: block;
  }

  .lightbox-info {
    width: 220px;
    flex-shrink: 0;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-left: 1px solid var(--border);
  }

  .lightbox-fornecedor {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .lightbox-nome {
    font-family: "Nunito", sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
  }

  .lightbox-data {
    font-size: 11px;
    color: var(--gray);
    margin-top: 0.5rem;
  }

  .lightbox-nav { display: flex; gap: 8px; }

  .btn-nav {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: "Nunito Sans", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-nav:hover { background: var(--red); color: var(--white); border-color: var(--red); }

  .btn-fechar {
    position: absolute;
    top: -2.5rem;
    right: 0;
    background: transparent;
    border: none;
    color: var(--white);
    font-family: "Nunito Sans", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 0;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .btn-fechar:hover { opacity: 1; }

  @media (max-width: 640px) {
    .lightbox-inner { flex-direction: column; max-width: 95vw; max-height: 92vh; }
    .lightbox-img-wrap { max-width: 100%; max-height: 55vh; }
    .lightbox-info { width: 100%; padding: 1rem 1.25rem; border-left: none; border-top: 1px solid var(--border); }
  }

  /* ESTADOS */
  #loading { text-align: center; padding: 6rem 2rem; }

  .loading-text {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-light);
    animation: pulso 1.5s ease-in-out infinite;
  }

  @keyframes pulso {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  #erro { display: none; text-align: center; padding: 6rem 2rem; }
  #erro p { font-size: 1rem; color: var(--gray); margin-bottom: 1rem; }
  #erro code { font-size: 11px; background: var(--red-light); padding: 4px 10px; color: var(--red); border-radius: 4px; display: inline-block; }

  .sem-resultados {
    text-align: center;
    padding: 3rem;
    color: var(--gray-light);
    font-size: 13px;
    letter-spacing: 0.1em;
    grid-column: 1/-1;
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="./logo-afife.jpg" alt="Afife">
  </div>
  <div class="header-center">
    <p>⚠ Preços sujeitos a alteração</p>
    <p>⚠ Disponibilidade dos produtos a confirmar</p>
  </div>
  <div class="header-right">
    <span class="label">Atualizado em</span>
    <span class="value" id="meta-data">—</span>
  </div>
</header>

<div class="controls" id="controls" style="display:none">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="busca" placeholder="Buscar produto..." autocomplete="off">
  </div>
  <div class="filter-tabs" id="filter-tabs"></div>
  <select class="filter-select" id="filter-select"></select>
</div>

<main>
  <div id="loading"><p class="loading-text">Carregando catálogo...</p></div>
  <div id="erro">
    <p>Não foi possível carregar o catálogo.</p>
    <p><code id="erro-msg"></code></p>
    <p style="font-size:11px;color:var(--gray);margin-top:1rem">Verifique se a URL do Apps Script está configurada corretamente.</p>
  </div>
  <div id="catalogo"></div>
</main>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="btn-fechar" id="btn-fechar">✕ Fechar</button>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <div class="lightbox-info">
      <div>
        <p class="lightbox-fornecedor" id="lb-fornecedor"></p>
        <h3 class="lightbox-nome" id="lb-nome"></h3>
        <p class="lightbox-data" id="lb-data"></p>
      </div>
      <div class="lightbox-nav">
        <button class="btn-nav" id="btn-prev">← Ant.</button>
        <button class="btn-nav" id="btn-next">Próx. →</button>
      </div>
    </div>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDoGXKADH83e4EPlMNccDY72-n5_5cXXT66tLOa6hy6fzLuYz-x97MtWt5FBei6vI/exec";

var dadosCatalogo = [];
var novidades = [];
var produtosFiltrados = [];
var idxAtual = 0;
var modoAtivo = "todos";

function init() {
  if (SCRIPT_URL === "COLE_A_URL_DO_APPS_SCRIPT_AQUI") {
    mostrarErro("URL não configurada. Edite o HTML e cole a URL do Apps Script.");
    return;
  }
  fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(dados) {
      dadosCatalogo = dados.fornecedores;
      novidades = dados.novidades;
      document.getElementById("meta-data").textContent = dados.atualizado;
      construirFiltros();
      renderizar();
      document.getElementById("loading").style.display = "none";
      document.getElementById("controls").style.display = "flex";
    })
    .catch(function(e) { mostrarErro(e.message); });
}

function construirFiltros() {
  // Pills desktop
  var tabs = document.getElementById("filter-tabs");
  var html = '<button class="tab tab-novidades" data-f="novidades">★ Novidades</button>';
  html += '<button class="tab ativo" data-f="todos">Todos</button>';
  dadosCatalogo.forEach(function(f) {
    html += '<button class="tab" data-f="' + f.nome + '">' + f.nome + '</button>';
  });
  tabs.innerHTML = html;
  tabs.addEventListener("click", function(e) {
    var btn = e.target.closest(".tab");
    if (!btn) return;
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("ativo"); });
    btn.classList.add("ativo");
    modoAtivo = btn.dataset.f;
    document.getElementById("busca").value = "";
    // Sincroniza select
    document.getElementById("filter-select").value = modoAtivo;
    renderizar();
  });

  // Select mobile
  var sel = document.getElementById("filter-select");
  var opts = '<option value="novidades">★ Novidades</option>';
  opts += '<option value="todos" selected>Todos os fornecedores</option>';
  dadosCatalogo.forEach(function(f) {
    opts += '<option value="' + f.nome + '">' + f.nome + '</option>';
  });
  sel.innerHTML = opts;
  sel.addEventListener("change", function() {
    modoAtivo = sel.value;
    // Sincroniza tabs
    document.querySelectorAll(".tab").forEach(function(t) {
      t.classList.toggle("ativo", t.dataset.f === modoAtivo);
    });
    document.getElementById("busca").value = "";
    renderizar();
  });
}

function diasAtras(ts) {
  var diff = Date.now() - ts;
  var dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  if (dias === 0) return "hoje";
  if (dias === 1) return "ontem";
  return "há " + dias + " dias";
}

function renderizar() {
  var busca = (document.getElementById("busca").value || "").toLowerCase();
  var catalogo = document.getElementById("catalogo");
  var html = "";
  produtosFiltrados = [];

  if (modoAtivo === "novidades") {
    var lista = novidades.filter(function(p) {
      return !busca || p.nome.toLowerCase().includes(busca) || p.fornecedor.toLowerCase().includes(busca);
    });

    if (lista.length === 0) {
      html = '<div class="grid"><p class="sem-resultados">Nenhum produto encontrado.</p></div>';
    } else {
      html += '<div class="banner-novidades"><p>★ Chegadas mais recentes <span>— do mais recente ao mais antigo</span></p></div>';
      html += '<div class="grid">';
      lista.forEach(function(p) {
        var idx = produtosFiltrados.length;
        produtosFiltrados.push(p);
        html += '<div class="card" data-idx="' + idx + '">';
        html += '<div class="card-img-wrap">';
        html += '<span class="badge-novo">' + diasAtras(p.criadoEm) + '</span>';
        html += '<img src="' + p.thumb + '" alt="' + p.nome + '" loading="lazy" onerror="imgErr(this)">';
        html += '</div><div class="card-info">';
        html += '<p class="card-nome">' + p.nome + '</p>';
        html += '<p class="card-fornecedor">' + p.fornecedor + '</p>';
        html += '</div></div>';
      });
      html += '</div>';
    }
  } else {
    dadosCatalogo.forEach(function(f) {
      if (modoAtivo !== "todos" && f.nome !== modoAtivo) return;
      var prods = f.produtos.filter(function(p) {
        return !busca || p.nome.toLowerCase().includes(busca);
      });
      if (prods.length === 0) return;

      html += '<section class="secao-fornecedor">';
      html += '<div class="secao-header"><h2>' + f.nome + '</h2><span class="pill">' + prods.length + ' ' + (prods.length === 1 ? "produto" : "produtos") + '</span></div>';
      html += '<div class="grid">';
      prods.forEach(function(p) {
        var idx = produtosFiltrados.length;
        produtosFiltrados.push(p);
        html += '<div class="card" data-idx="' + idx + '">';
        html += '<div class="card-img-wrap">';
        html += '<img src="' + p.thumb + '" alt="' + p.nome + '" loading="lazy" onerror="imgErr(this)">';
        html += '</div><div class="card-info"><p class="card-nome">' + p.nome + '</p></div>';
        html += '</div>';
      });
      html += '</div></section>';
    });

    if (html === "") {
      html = '<div class="grid"><p class="sem-resultados">Nenhum produto encontrado.</p></div>';
    }
  }

  catalogo.innerHTML = html;
  catalogo.querySelectorAll(".card").forEach(function(card) {
    card.addEventListener("click", function() {
      abrirLightbox(parseInt(card.dataset.idx));
    });
  });
}

function abrirLightbox(idx) {
  idxAtual = idx;
  var p = produtosFiltrados[idx];
  document.getElementById("lb-img").src = p.url;
  document.getElementById("lb-nome").textContent = p.nome;
  document.getElementById("lb-fornecedor").textContent = p.fornecedor;
  document.getElementById("lb-data").textContent = p.criadoEm ? "Adicionado " + diasAtras(p.criadoEm) : "";
  document.getElementById("lightbox").classList.add("aberto");
}

function fecharLightbox() {
  document.getElementById("lightbox").classList.remove("aberto");
  document.getElementById("lb-img").src = "";
}

document.getElementById("btn-fechar").addEventListener("click", fecharLightbox);
document.getElementById("lightbox").addEventListener("click", function(e) {
  if (e.target === this) fecharLightbox();
});
document.getElementById("btn-prev").addEventListener("click", function() {
  idxAtual = (idxAtual - 1 + produtosFiltrados.length) % produtosFiltrados.length;
  abrirLightbox(idxAtual);
});
document.getElementById("btn-next").addEventListener("click", function() {
  idxAtual = (idxAtual + 1) % produtosFiltrados.length;
  abrirLightbox(idxAtual);
});
document.addEventListener("keydown", function(e) {
  if (!document.getElementById("lightbox").classList.contains("aberto")) return;
  if (e.key === "Escape") fecharLightbox();
  if (e.key === "ArrowLeft") document.getElementById("btn-prev").click();
  if (e.key === "ArrowRight") document.getElementById("btn-next").click();
});
document.getElementById("busca").addEventListener("input", renderizar);

function imgErr(el){el.style.display="none";}
function mostrarErro(msg) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("erro").style.display = "block";
  document.getElementById("erro-msg").textContent = msg;
}

init();
</script>
</body>
</html>
